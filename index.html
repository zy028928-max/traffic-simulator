<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcade Highway Driving Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }

    /* ❌ BORDER REMOVED (invisible bounds only now) */
    canvas {
      display: block;
      margin: auto;
      background: #2b2b2b;
      border: none;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "playing";
let explosionTime = 0;
let score = 0;

// ROAD
let roadOffset = 0;
const roadSpeed = 4;

// LANES
const LANES = 5;
const laneWidth = canvas.width / LANES;

// DENSITY
let maxDensity = 6;
function updateDensity() {
  maxDensity = 6 + Math.floor(score / 500);
}

// PLAYER
let car = {
  x: canvas.width / 2 - 15,
  y: canvas.height - 200,
  width: 38,
  height: 74,
  vx: 0,
  vy: 0,
  speed: 1,
  friction: 0.82,
  angle: 0
};

let keys = {};
let enemies = [];
let particles = [];
let lastSpawnY = new Array(LANES).fill(-9999);

// RESET
function resetGame() {
  gameState = "playing";
  explosionTime = 0;
  score = 0;
  enemies = [];
  particles = [];
  car.x = canvas.width / 2 - 15;
  car.y = canvas.height - 200;
  car.vx = 0;
  car.vy = 0;
  car.angle = 0;
  lastSpawnY.fill(-9999);
  maxDensity = 6;
}

// SPEED BALANCER
function generateUniqueSpeed(existingSpeeds) {
  let speed;
  let tries = 0;

  do {
    speed = 5 + Math.random() * 2.5;
    tries++;
  } while (
    existingSpeeds.some(s => Math.abs(s - speed) < 0.5) &&
    tries < 10
  );

  return speed;
}

// SPAWN
function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANES);

  if (lastSpawnY[lane] > -120 && lastSpawnY[lane] < 140) return;

  const recentSpeeds = enemies.slice(-LANES).map(e => e.speed);
  const speed = generateUniqueSpeed(recentSpeeds);

  const colors = ["blue", "purple", "green", "orange", "cyan"];
  const color = colors[Math.floor(Math.random() * colors.length)];

  const w = car.width;
  const h = 70 + Math.random() * 20;

  const x = lane * laneWidth + laneWidth / 2 - w / 2;

  enemies.push({
    x,
    y: -120,
    width: w,
    height: h,
    speed,
    color,
    lane
  });

  lastSpawnY[lane] = 0;
}

// EXPLOSION
function explode(x, y) {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 11,
      vy: (Math.random() - 0.5) * 11,
      life: 45
    });
  }
}

// UPDATE
function update() {
  if (gameState !== "playing") return;

  updateDensity();
  roadOffset += roadSpeed;

  if (keys["ArrowLeft"]) car.vx -= car.speed;
  if (keys["ArrowRight"]) car.vx += car.speed;
  if (keys["ArrowUp"]) car.vy -= car.speed;
  if (keys["ArrowDown"]) car.vy += car.speed;

  car.vx *= car.friction;
  car.vy *= 0.84;

  car.x += car.vx;
  car.y += car.vy;

  let targetAngle = car.vx * 0.06;
  const max = 15 * Math.PI / 180;
  targetAngle = Math.max(-max, Math.min(max, targetAngle));
  car.angle += (targetAngle - car.angle) * 0.12;

  // 🚫 HARD SCREEN LOCK (fully prevents leaving screen)
  if (car.x < 0) {
    car.x = 0;
    car.vx = 0;
  }
  if (car.x > canvas.width - car.width) {
    car.x = canvas.width - car.width;
    car.vx = 0;
  }
  if (car.y < 0) {
    car.y = 0;
    car.vy = 0;
  }
  if (car.y > canvas.height - car.height) {
    car.y = canvas.height - car.height;
    car.vy = 0;
  }

  // ENEMIES
  for (let i = 0; i < enemies.length; i++) {
    enemies[i].y += enemies[i].speed;
    lastSpawnY[enemies[i].lane] = enemies[i].y;

    if (
      car.x < enemies[i].x + enemies[i].width &&
      car.x + car.width > enemies[i].x &&
      car.y < enemies[i].y + enemies[i].height &&
      car.y + car.height > enemies[i].y
    ) {
      gameState = "exploding";
      explode(car.x + car.width / 2, car.y + car.height / 2);
      explosionTime = 30;
    }

    if (enemies[i].y > canvas.height) score++;
  }

  enemies = enemies.filter(e => e.y < canvas.height + 150);

  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  if (gameState === "exploding") {
    explosionTime--;
    if (explosionTime <= 0) gameState = "gameover";
  }
}

// ROAD
function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "white";
  ctx.setLineDash([18, 14]);
  ctx.lineDashOffset = -roadOffset;

  for (let i = 1; i < LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(laneWidth * i, 0);
    ctx.lineTo(laneWidth * i, canvas.height);
    ctx.stroke();
  }
}

// CAR
function drawCar() {
  ctx.save();
  ctx.translate(car.x + car.width / 2, car.y + car.height / 2);
  ctx.rotate(car.angle);

  ctx.fillStyle = "red";
  ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);

  ctx.fillStyle = "#bfefff";
  ctx.fillRect(-car.width / 2 + 4, -car.height / 2 + 10, car.width - 8, 16);

  ctx.fillStyle = "yellow";
  ctx.fillRect(-car.width / 2 + 3, car.height / 2 - 10, 5, 5);
  ctx.fillRect(car.width / 2 - 8, car.height / 2 - 10, 5, 5);

  ctx.restore();
}

// ENEMIES
function drawEnemies() {
  for (let e of enemies) {
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.width, e.height);

    ctx.fillStyle = "#111";
    ctx.fillRect(e.x + 5, e.y + 10, e.width - 10, 14);

    ctx.fillStyle = "#cfefff";
    ctx.fillRect(e.x + 4, e.y + 12, e.width - 8, 10);
  }
}

// PARTICLES
function drawParticles() {
  ctx.fillStyle = "orange";
  for (let p of particles) {
    ctx.fillRect(p.x, p.y, 5, 5);
  }
}

// SCORE
function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 25);
}

// LOOP
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRoad();
  update();
  drawEnemies();
  drawCar();
  drawParticles();
  drawScore();
  requestAnimationFrame(gameLoop);
}

// INPUT
window.addEventListener("keydown", (e) => {
  keys[e.key] = true;
  if (e.key.toLowerCase() === "r") resetGame();
});

window.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

// SPAWN CONTROL
setInterval(() => {
  if (gameState !== "playing") return;

  if (enemies.length < maxDensity) {
    spawnEnemy();
  }
}, 900);

gameLoop();
</script>

</body>
</html>

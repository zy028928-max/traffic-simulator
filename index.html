<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcade Highway Driving Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0e0e0e; }

    canvas {
      display: block;
      margin: auto;
      background: linear-gradient(#2b2b2b, #151515);
      border: none;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// STATE
let gameState = "playing";
let explosionTime = 0;
let score = 0;

// ROAD
let roadOffset = 0;
const roadSpeed = 4;

// LANES
const LANES = 5;
const laneWidth = canvas.width / LANES;

// SCALING
let maxDensity = 6;
let trafficSpeedBoost = 0;

function updateScaling() {
  const level = Math.floor(score / 500);
  maxDensity = 6 + level * 2;
  trafficSpeedBoost = level * 0.25;
}

// PLAYER
let car = {
  x: canvas.width / 2 - 18,
  y: canvas.height - 200,
  width: 42,
  height: 78,
  vx: 0,
  vy: 0,
  speed: 1,
  friction: 0.82,
  angle: 0
};

let keys = {};
let enemies = [];
let coins = [];
let particles = [];

// RESET
function resetGame() {
  gameState = "playing";
  explosionTime = 0;
  score = 0;
  enemies = [];
  coins = [];
  particles = [];
  car.x = canvas.width / 2 - 18;
  car.y = canvas.height - 200;
  car.vx = 0;
  car.vy = 0;
  car.angle = 0;
  maxDensity = 6;
  trafficSpeedBoost = 0;
}

// SPEED
function generateUniqueSpeed(existingSpeeds) {
  let speed;
  let tries = 0;

  do {
    speed = 5 + Math.random() * 2.5;
    tries++;
  } while (
    existingSpeeds.some(s => Math.abs(s - speed) < 0.5) &&
    tries < 10
  );

  return speed;
}

// 🚗 TRAFFIC
function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANES);

  const recentSpeeds = enemies.slice(-LANES).map(e => e.speed);
  const baseSpeed = generateUniqueSpeed(recentSpeeds);

  const colors = ["#2f6bff", "#a855f7", "#22c55e", "#f97316", "#06b6d4"];

  const w = car.width;
  const h = 74 + Math.random() * 10;

  const x = lane * laneWidth + laneWidth / 2 - w / 2;

  enemies.push({
    x,
    y: -120,
    width: w,
    height: h,
    speed: baseSpeed,
    color: colors[Math.floor(Math.random() * colors.length)],
    lane
  });
}

// 🪙 COINS (VERTICAL COLUMN)
function spawnCoinColumn() {
  const lane = Math.floor(Math.random() * LANES);
  const count = 3 + Math.floor(Math.random() * 4);

  for (let i = 0; i < count; i++) {
    coins.push({
      x: lane * laneWidth + laneWidth / 2,
      y: -i * 50,
      r: 10
    });
  }
}

// 💥 EXPLOSION
function explode(x, y) {
  for (let i = 0; i < 90; i++) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      life: 50
    });
  }
}

// UPDATE
function update() {
  if (gameState !== "playing") return;

  updateScaling();
  roadOffset += roadSpeed;

  // PLAYER
  if (keys["ArrowLeft"]) car.vx -= car.speed;
  if (keys["ArrowRight"]) car.vx += car.speed;
  if (keys["ArrowUp"]) car.vy -= car.speed;
  if (keys["ArrowDown"]) car.vy += car.speed;

  car.vx *= car.friction;
  car.vy *= 0.84;

  car.x += car.vx;
  car.y += car.vy;

  let targetAngle = car.vx * 0.06;
  const max = 15 * Math.PI / 180;
  targetAngle = Math.max(-max, Math.min(max, targetAngle));
  car.angle += (targetAngle - car.angle) * 0.12;

  car.x = Math.max(0, Math.min(canvas.width - car.width, car.x));
  car.y = Math.max(0, Math.min(canvas.height - car.height, car.y));

  // ENEMIES
  for (let i = 0; i < enemies.length; i++) {
    enemies[i].y += enemies[i].speed + trafficSpeedBoost;

    if (
      car.x < enemies[i].x + enemies[i].width &&
      car.x + car.width > enemies[i].x &&
      car.y < enemies[i].y + enemies[i].height &&
      car.y + car.height > enemies[i].y
    ) {
      gameState = "exploding";
      explode(car.x + car.width / 2, car.y + car.height / 2);
      explosionTime = 30;
    }
  }

  enemies = enemies.filter(e => e.y < canvas.height + 150);

  // 🪙 COINS
  for (let i = 0; i < coins.length; i++) {
    coins[i].y += 7;

    if (
      car.x + 2 < coins[i].x + coins[i].r &&
      car.x + car.width - 2 > coins[i].x - coins[i].r &&
      car.y + 2 < coins[i].y + coins[i].r &&
      car.y + car.height - 2 > coins[i].y - coins[i].r
    ) {
      score += 10;
      coins.splice(i, 1);
      i--;
    }
  }

  coins = coins.filter(c => c.y < canvas.height + 50);

  // PARTICLES
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  if (gameState === "exploding") {
    explosionTime--;
    if (explosionTime <= 0) gameState = "gameover";
  }
}

// ROAD
function drawRoad() {
  let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "#2b2b2b");
  grad.addColorStop(1, "#121212");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.setLineDash([20, 18]);
  ctx.lineDashOffset = -roadOffset;

  for (let i = 1; i < LANES; i++) {
    ctx.beginPath();
    ctx.moveTo(laneWidth * i, 0);
    ctx.lineTo(laneWidth * i, canvas.height);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

// PLAYER
function drawCar() {
  ctx.save();
  ctx.translate(car.x + car.width / 2, car.y + car.height / 2);
  ctx.rotate(car.angle);

  ctx.fillStyle = "#ff1e1e";
  ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);

  ctx.fillStyle = "#9be7ff";
  ctx.fillRect(-car.width / 2 + 5, -car.height / 2 + 12, car.width - 10, 18);

  ctx.restore();
}

// ENEMIES
function drawEnemies() {
  for (let e of enemies) {
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.width, e.height);

    ctx.fillStyle = "#111";
    ctx.fillRect(e.x + 4, e.y + 10, e.width - 8, 14);

    ctx.fillStyle = "#cfefff";
    ctx.fillRect(e.x + 6, e.y + 12, e.width - 12, 10);

    ctx.fillStyle = "yellow";
    ctx.fillRect(e.x + 3, e.y + e.height - 8, 5, 5);
    ctx.fillRect(e.x + e.width - 8, e.y + e.height - 8, 5, 5);
  }
}

// COINS
function drawCoins() {
  for (let c of coins) {
    ctx.fillStyle = "#ffd700";
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// PARTICLES
function drawParticles() {
  ctx.fillStyle = "orange";
  for (let p of particles) {
    ctx.fillRect(p.x, p.y, 4, 4);
  }
}

// SCORE
function drawScore() {
  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 25);
}

// LOOP
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  update();
  drawEnemies();
  drawCoins();
  drawCar();
  drawParticles();
  drawScore();

  requestAnimationFrame(gameLoop);
}

// INPUT
window.addEventListener("keydown", (e) => {
  keys[e.key] = true;
  if (e.key.toLowerCase() === "r") resetGame();
});

window.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

// SPAWN ENEMIES
setInterval(() => {
  if (gameState !== "playing") return;
  if (enemies.length < maxDensity) spawnEnemy();
}, 900);

// 🪙 COINS (10–15 seconds)
setInterval(() => {
  if (gameState !== "playing") return;

  const delay = 10000 + Math.random() * 5000;
  setTimeout(() => {
    if (gameState === "playing") spawnCoinColumn();
  }, delay);

}, 12000);

// SCORE (reduced)
setInterval(() => {
  if (gameState === "playing") score += 1;
}, 100);

gameLoop();
</script>

</body>
</html>
